<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>World Editor — Car Personal Website</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; background: #060912; color: #e5e7eb;
        font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
      /* Slide-in from the right when arriving from the library; the
         body/css class is set by editor.ts via sessionStorage. */
      @keyframes editor-slide-in-right {
        from { transform: translateX(100vw); opacity: 0.4; }
        to   { transform: translateX(0); opacity: 1; }
      }
      @keyframes editor-slide-in-left {
        from { transform: translateX(-100vw); opacity: 0.4; }
        to   { transform: translateX(0); opacity: 1; }
      }
      #app {
        display: grid;
        grid-template-columns: 1fr 320px;
        height: 100vh;
        will-change: transform, opacity;
      }
      body.nav-from-library #app { animation: editor-slide-in-right 0.5s cubic-bezier(0.18, 0.84, 0.24, 1); }
      body.nav-from-home #app    { animation: editor-slide-in-right 0.5s cubic-bezier(0.18, 0.84, 0.24, 1); }
      #app.is-leaving-left  { transform: translateX(-100vw); opacity: 0; transition: transform 0.35s cubic-bezier(0.4,0,1,1), opacity 0.3s ease-in; }
      #app.is-leaving-right { transform: translateX( 100vw); opacity: 0; transition: transform 0.35s cubic-bezier(0.4,0,1,1), opacity 0.3s ease-in; }

      #canvas-wrap { position: relative; }
      #editor-canvas { display: block; width: 100%; height: 100%; }

      #title-bar {
        position: absolute; top: 16px; left: 16px;
        font-size: 13px; letter-spacing: 1px; text-transform: uppercase;
        color: rgba(255, 255, 255, 0.55);
      }
      #title-bar a { color: #93c5fd; text-decoration: none; }

      /* Mode HUD: bottom-left status banner that tells the user what
         mode they're in (placing / trash / idle) and the active hot keys. */
      #mode-hud {
        position: absolute; bottom: 16px; left: 16px;
        background: rgba(10, 14, 24, 0.85);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 8px;
        padding: 10px 14px;
        font-size: 12px;
        line-height: 1.55;
        color: rgba(255, 255, 255, 0.7);
        max-width: 380px;
      }
      #mode-hud strong { color: #fff; }
      #mode-hud .kbd {
        display: inline-block;
        margin: 0 2px;
        padding: 1px 6px;
        font-family: ui-monospace, monospace;
        font-size: 11px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-bottom-width: 2px;
        border-radius: 3px;
        color: #fff;
        background: rgba(255, 255, 255, 0.05);
      }

      /* Sidebar — same look as the library asset list. */
      #sidebar {
        background: #0a0e18;
        border-left: 1px solid rgba(255, 255, 255, 0.06);
        overflow-y: auto;
        padding: 16px 12px;
      }
      #sidebar::-webkit-scrollbar { width: 6px; }
      #sidebar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); border-radius: 3px; }
      .lib-section { margin-bottom: 18px; }
      .lib-section h2 {
        font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
        color: rgba(255, 255, 255, 0.4); margin: 0 0 6px 4px;
      }
      .lib-row {
        display: grid;
        grid-template-columns: 12px 1fr auto;
        align-items: center;
        gap: 8px;
        padding: 6px 8px;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.85);
        border-radius: 4px;
        cursor: pointer;
        transition: background 0.12s;
      }
      .lib-row:hover { background: rgba(255, 255, 255, 0.05); }
      .lib-row.active { background: rgba(99, 102, 241, 0.2); color: #fff; }
      .lib-dot { width: 10px; height: 10px; border-radius: 50%; }
      .lib-meta { font-size: 10px; color: rgba(255, 255, 255, 0.35); font-family: ui-monospace, monospace; }

      /* Toolbar (top-right of canvas): trashcan toggle. */
      #toolbar {
        position: absolute; top: 16px; right: 16px;
        display: flex; gap: 8px;
        z-index: 10;
      }
      #trash-btn {
        background: rgba(10, 14, 24, 0.85);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: rgba(255, 255, 255, 0.75);
        padding: 8px 14px;
        font-size: 18px;
        border-radius: 6px;
        cursor: pointer;
        transition: border-color 0.15s ease, color 0.15s ease, background 0.15s ease;
      }
      #trash-btn:hover { border-color: #f87171; color: #f87171; }
      #trash-btn.active { border-color: #f87171; color: #f87171; background: rgba(248, 113, 113, 0.18); }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="canvas-wrap">
        <canvas id="editor-canvas"></canvas>
        <div id="title-bar">
          <a href="/">← home</a> &nbsp;·&nbsp;
          <a href="/library.html">library</a> &nbsp;·&nbsp;
          <span>World Editor</span>
        </div>
        <div id="toolbar">
          <button id="trash-btn" type="button" title="Toggle trash mode (click placed assets to remove)">🗑</button>
        </div>
        <div id="mode-hud">
          <div id="mode-line"><strong>Idle.</strong> Click an asset to start placing.</div>
          <div style="margin-top: 6px; color: rgba(255,255,255,0.45);">
            While placing: <span class="kbd">W</span><span class="kbd">S</span> scale, <span class="kbd">A</span><span class="kbd">D</span> rotate, click to drop, <span class="kbd">Esc</span> cancel.
          </div>
        </div>
      </div>
      <aside id="sidebar"></aside>
    </div>
    <script type="module" src="/src/editor.ts"></script>
  </body>
</html>
