<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Asset Library — Car Personal Website</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; background: #060912; color: #e5e7eb;
        font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
      /* Slide-in from the right on every load — the home page uses a column
         teardown wave to exit, this is the library's matching entry. */
      @keyframes lib-slide-in {
        from { transform: translateX(100vw); opacity: 0.4; }
        to   { transform: translateX(0);     opacity: 1; }
      }
      #app {
        display: grid;
        grid-template-columns: 1fr 320px;
        height: 100vh;
        animation: lib-slide-in 0.5s cubic-bezier(0.18, 0.84, 0.24, 1);
        will-change: transform, opacity;
      }
      /* Applied by library.ts when the user clicks "← home" — slides the
         library off to the RIGHT (back direction). The home page's
         entry then slides in from the left, so the user sees one
         continuous rightward sweep instead of two opposing motions. */
      #app.is-leaving {
        transform: translateX(100vw);
        opacity: 0;
        transition: transform 0.35s cubic-bezier(0.4, 0.0, 1, 1), opacity 0.3s ease-in;
      }
      #canvas-wrap { position: relative; }
      #lib-canvas { display: block; width: 100%; height: 100%; }

      #title-bar {
        position: absolute; top: 16px; left: 16px;
        font-size: 13px; letter-spacing: 1px; text-transform: uppercase;
        color: rgba(255, 255, 255, 0.55);
      }
      #title-bar a { color: #93c5fd; text-decoration: none; }

      #sidebar {
        background: #0a0e18;
        border-left: 1px solid rgba(255, 255, 255, 0.06);
        overflow-y: auto;
        padding: 16px 12px;
      }
      #sidebar::-webkit-scrollbar { width: 6px; }
      #sidebar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); border-radius: 3px; }

      .lib-section { margin-bottom: 18px; }
      .lib-section h2 {
        font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
        color: rgba(255, 255, 255, 0.4); margin: 0 0 6px 4px;
      }
      .lib-row {
        display: grid;
        grid-template-columns: 12px 1fr auto;
        align-items: center;
        gap: 8px;
        padding: 6px 8px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
      }
      .lib-row:hover { background: rgba(255, 255, 255, 0.04); }
      .lib-row.active { background: rgba(99, 102, 241, 0.18); }
      .lib-dot { width: 8px; height: 8px; border-radius: 50%; }
      .lib-meta { color: rgba(255, 255, 255, 0.4); font-size: 11px; }

      #info-panel {
        position: absolute; bottom: 16px; left: 16px;
        max-width: 380px;
        background: rgba(10, 14, 24, 0.85);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 8px;
        padding: 12px 14px;
        font-size: 12px;
        line-height: 1.5;
        color: rgba(255, 255, 255, 0.7);
      }
      #info-panel h3 { margin: 0 0 4px; font-size: 14px; color: #fff; }
      #info-panel .info-meta { color: rgba(255, 255, 255, 0.4); font-size: 11px; }

      /* Animation picker: appears for assets that ship with multiple
         clips (corgi, etc.). Empty list → block hidden via .hidden. */
      #anim-picker {
        margin-top: 10px;
        max-height: 168px;
        overflow-y: auto;
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
      }
      #anim-picker.hidden { display: none; }
      #anim-picker::-webkit-scrollbar { width: 6px; }
      #anim-picker::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); border-radius: 3px; }
      .anim-chip {
        display: inline-block;
        padding: 3px 8px;
        font-size: 11px;
        letter-spacing: 0.04em;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 4px;
        color: rgba(255, 255, 255, 0.7);
        background: rgba(255, 255, 255, 0.03);
        cursor: pointer;
        transition: border-color 0.12s ease, color 0.12s ease, background 0.12s ease;
      }
      .anim-chip:hover {
        border-color: #93c5fd;
        color: #93c5fd;
      }
      .anim-chip.active {
        border-color: rgba(255, 255, 255, 0.6);
        color: #fff;
        background: rgba(255, 255, 255, 0.08);
      }
      .anim-chip.loading {
        opacity: 0.5;
        cursor: wait;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="canvas-wrap">
        <canvas id="lib-canvas"></canvas>
        <div id="title-bar">
          <a href="/">← home</a> &nbsp;·&nbsp; <a href="/editor.html">editor →</a> &nbsp;·&nbsp; <span>Asset Library</span>
        </div>
        <div id="info-panel">
          <h3 id="info-name">—</h3>
          <div class="info-meta" id="info-source">—</div>
          <div id="info-notes" style="margin-top: 6px;"></div>
          <div id="anim-picker" class="hidden"></div>
        </div>
      </div>
      <aside id="sidebar"></aside>
    </div>
    <script type="module" src="/src/library.ts"></script>
  </body>
</html>
